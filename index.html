<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karan's Server Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            background-color: var(--card-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
        }

        .card-icon {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            min-width: 0; /* Enables text truncation */
        }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-title.wrap-text {
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-muted);
            box-shadow: 0 0 0 2px var(--card-bg);
            flex-shrink: 0;
        }

        .status-online {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-offline {
            background-color: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .status-checking {
            background-color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Automation specific styles */
        .automations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        .automation-card {
            justify-content: center;
            text-align: center;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
        }

        .automation-card .card-icon {
            width: 42px;
            height: 42px;
            font-size: 1.5rem;
            margin-bottom: 0;
        }

        .automation-card .card-title {
            font-size: 0.9rem;
            white-space: normal;
            line-height: 1.2;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 50;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .automations-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Karan's Server Dashboard</h1>
            <p class="subtitle">Central hub for all self-hosted services</p>
        </header>

        <div id="dashboard-content">
            <!-- Content will be injected here by JS -->
            <div style="text-align: center; color: var(--text-muted); padding: 3rem;">
                Loading configuration...
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let config = null;

        // Configuration fallback in case config.json fails to load
        const defaultConfig = {
            servers: [
                { name: "Remote Server", url: "https://home.miglanis.in" },
                { name: "Local Server", url: "http://192.168.1.114" }
            ],
            shortcuts: [
                { name: "Jellyfin", icon: "🎬", url: "http://192.168.1.114:8096" },
                { name: "qBittorrent", icon: "⬇️", url: "http://192.168.1.114:8080" }
            ],
            automations: [
                { name: "Wake on LAN", icon: "⚡", action: "/api/wol" }
            ]
        };

        // Utility to show toast notifications
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Load configuration first
        async function loadConfig() {
            try {
                const response = await fetch('config.json?cb=' + new Date().getTime());
                if (response.ok) {
                    config = await response.json();
                } else {
                    throw new Error('Failed to load config.json');
                }
            } catch (error) {
                console.warn('Using default configuration:', error);
                config = defaultConfig;
                showToast('Loaded default configuration. Create config.json to customize.');
            }
        }

        // Ping function using fetch with no-cors
        async function checkStatus(url) {
            try {
                const urlObj = new URL(url);
                const origin = urlObj.origin;
                const cacheBuster = `?cb=${new Date().getTime()}`;

                // Method 1: Try fetching the favicon (fastest, usually bypasses auth)
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);
                    
                    await fetch(`${origin}/favicon.ico${cacheBuster}`, { 
                        mode: 'no-cors', 
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    return true; // If fetch doesn't throw, it's reachable
                } catch (e) {
                    // Method 1 failed, continue to Method 2
                }

                // Method 2: Try fetching the root URL
                // This will succeed (opaque response) if the server is up, even if it returns 404/500
                // It will throw an error ONLY if the network is unreachable, connection refused, or Mixed Content blocked
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                await fetch(`${url}${url.includes('?') ? '&' : '?'}${cacheBuster.substring(1)}`, { 
                    mode: 'no-cors', 
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                return true;
            } catch (error) {
                // If fetch throws, the server is genuinely unreachable (or blocked by browser Mixed Content rules)
                return false;
            }
        }

        // Render the dashboard
        function renderDashboard() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = '';

            // 1. Server Status Section
            if (config.servers && config.servers.length > 0) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2 class="section-title">Server Status</h2><div class="grid" id="servers-grid"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('#servers-grid');
                config.servers.forEach((server, index) => {
                    const id = `server-${index}`;
                    const card = document.createElement('a');
                    card.href = server.url;
                    card.target = "_blank";
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-icon">🖥️</div>
                        <div class="card-content">
                            <div class="card-title">${server.name}</div>
                            <div class="card-subtitle">${server.url}</div>
                        </div>
                        <div id="${id}-status" class="status-indicator status-checking" title="Checking status..."></div>
                    `;
                    grid.appendChild(card);
                    
                    updateStatus(server.url, `${id}-status`);
                });
            }

            // 2. Tools Section
            if (config.tools && config.tools.length > 0) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2 class="section-title">Tools</h2><div class="grid" id="tools-grid"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('#tools-grid');
                config.tools.forEach((tool) => {
                    const card = document.createElement('a');
                    card.href = tool.url;
                    card.target = "_blank";
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-icon">${tool.icon || '🧰'}</div>
                        <div class="card-content">
                            <div class="card-title">${tool.name}</div>
                            <div class="card-subtitle">${tool.url}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // 3. Automations Section
            if (config.automations && config.automations.length > 0) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2 class="section-title">Run Automations</h2><div class="automations-grid" id="automations-grid"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('#automations-grid');
                config.automations.forEach((automation) => {
                    const card = document.createElement('div');
                    card.className = 'card automation-card';
                    card.innerHTML = `
                        <div class="card-icon">${automation.icon || '⚡'}</div>
                        <div class="card-title">${automation.name}</div>
                    `;
                    card.onclick = async () => {
                        showToast(`Triggering ${automation.name}...`);
                        try {
                            await fetch(automation.action, { mode: 'no-cors' });
                            showToast(`Successfully triggered ${automation.name}`);
                        } catch (e) {
                            showToast(`Failed to trigger ${automation.name}`);
                        }
                    };
                    grid.appendChild(card);
                });
            }

            // 4. Applications Section
            if (config.shortcuts && config.shortcuts.length > 0) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2 class="section-title">Applications</h2><div class="grid" id="shortcuts-grid"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('#shortcuts-grid');
                config.shortcuts.forEach((shortcut, index) => {
                    const id = `shortcut-${index}`;
                    const card = document.createElement('a');
                    card.href = shortcut.url;
                    card.target = "_blank";
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-icon">${shortcut.icon || '🔗'}</div>
                        <div class="card-content">
                            <div class="card-title">${shortcut.name}</div>
                            <div class="card-subtitle">${shortcut.url}</div>
                        </div>
                        <div id="${id}-status" class="status-indicator status-checking" title="Checking status..."></div>
                    `;
                    grid.appendChild(card);

                    updateStatus(shortcut.url, `${id}-status`);
                });
            }

            // 5. Scripts Section
            if (config.scripts && config.scripts.length > 0) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2 class="section-title">Scripts</h2><div class="automations-grid" id="scripts-grid"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('#scripts-grid');
                config.scripts.forEach((script) => {
                    if (script.action) {
                        const card = document.createElement('div');
                        card.className = 'card automation-card';
                        card.innerHTML = `
                            <div class="card-icon">${script.icon || '📜'}</div>
                            <div class="card-title">${script.name}</div>
                        `;
                        card.onclick = async () => {
                            showToast(`Triggering ${script.name}...`);
                            try {
                                await fetch(script.action, { mode: 'no-cors' });
                                showToast(`Successfully triggered ${script.name}`);
                            } catch (e) {
                                showToast(`Failed to trigger ${script.name}`);
                            }
                        };
                        grid.appendChild(card);
                    } else {
                        const card = document.createElement('a');
                        card.href = script.url || '#';
                        card.target = "_blank";
                        card.className = 'card automation-card';
                        card.innerHTML = `
                            <div class="card-icon">${script.icon || '📜'}</div>
                            <div class="card-title">${script.name}</div>
                        `;
                        grid.appendChild(card);
                    }
                });
            }

            // 6. Workflows Section
            if (config.workflows && config.workflows.length > 0) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2 class="section-title">Workflows</h2><div class="grid" id="workflows-grid"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('#workflows-grid');
                config.workflows.forEach((workflow) => {
                    const card = document.createElement('a');
                    card.href = workflow.url || '#';
                    card.target = "_blank";
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-icon">${workflow.icon || '⚙️'}</div>
                        <div class="card-content">
                            <div class="card-title wrap-text">${workflow.name}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // 7. Bookmarks Section
            if (config.bookmarks && config.bookmarks.length > 0) {
                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<h2 class="section-title">Bookmarks</h2><div class="automations-grid" id="bookmarks-grid"></div>`;
                container.appendChild(section);

                const grid = section.querySelector('#bookmarks-grid');
                config.bookmarks.forEach((bookmark) => {
                    const card = document.createElement('a');
                    card.href = bookmark.url || '#';
                    card.target = "_blank";
                    card.className = 'card automation-card';
                    card.innerHTML = `
                        <div class="card-icon">${bookmark.icon || '🔖'}</div>
                        <div class="card-title">${bookmark.name}</div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // Update status indicator for a specific element
        async function updateStatus(url, elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            
            el.className = 'status-indicator status-checking';
            el.title = 'Checking status...';
            
            const isOnline = await checkStatus(url);
            
            el.className = `status-indicator ${isOnline ? 'status-online' : 'status-offline'}`;
            el.title = isOnline ? 'Online' : 'Offline';
        }

        // Periodically check all statuses
        function startStatusChecks() {
            setInterval(() => {
                if (config.servers) {
                    config.servers.forEach((server, index) => {
                        updateStatus(server.url, `server-${index}-status`);
                    });
                }
                if (config.shortcuts) {
                    config.shortcuts.forEach((shortcut, index) => {
                        updateStatus(shortcut.url, `shortcut-${index}-status`);
                    });
                }
            }, 30000);
        }

        // --- BOOTSTRAP LOGIC ---
        async function bootstrap() {
            await loadConfig();
            renderDashboard();
            startStatusChecks();
        }

        bootstrap();
    </script>
</body>
</html>
