<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karan's Server Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            background-color: var(--card-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
        }

        .card-icon {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            min-width: 0; /* Enables text truncation */
        }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-title.wrap-text {
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-muted);
            box-shadow: 0 0 0 2px var(--card-bg);
            flex-shrink: 0;
        }

        .status-online {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-offline {
            background-color: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .status-checking {
            background-color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Automation specific styles */
        .automations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        .automation-card {
            justify-content: center;
            text-align: center;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
        }

        .automation-card .card-icon {
            width: 42px;
            height: 42px;
            font-size: 1.5rem;
            margin-bottom: 0;
        }

        .automation-card .card-title {
            font-size: 0.9rem;
            white-space: normal;
            line-height: 1.2;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 50;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .automations-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Karan's Server Dashboard</h1>
            <p class="subtitle">Central hub for all self-hosted services</p>
        </header>

        <div id="dashboard-content">
            <!-- Content will be injected here by JS -->
            <div style="text-align: center; color: var(--text-muted); padding: 3rem;">
                Loading configuration...
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let config = null;

        // Configuration fallback in case config.json fails to load
        const defaultConfig = {
            sections: [
                {
                    title: "Server Status",
                    layout: "large",
                    showUrl: true,
                    showStatus: true,
                    items: [
                        { name: "Remote Server", icon: "🖥️", url: "https://home.miglanis.in" },
                        { name: "Local Server", icon: "💻", url: "http://192.168.1.114" }
                    ]
                },
                {
                    title: "Applications",
                    layout: "large",
                    showUrl: true,
                    showStatus: true,
                    items: [
                        { name: "Jellyfin", icon: "🎬", url: "http://192.168.1.114:8096" },
                        { name: "qBittorrent", icon: "⬇️", url: "http://192.168.1.114:8080" }
                    ]
                },
                {
                    title: "Automations",
                    layout: "small",
                    items: [
                        { name: "Wake on LAN", icon: "⚡", action: "/api/wol" }
                    ]
                }
            ]
        };

        // Utility to show toast notifications
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Load configuration first
        async function loadConfig() {
            try {
                const response = await fetch('config.json?cb=' + new Date().getTime());
                if (response.ok) {
                    config = await response.json();
                } else {
                    throw new Error('Failed to load config.json');
                }
            } catch (error) {
                console.warn('Using default configuration:', error);
                config = defaultConfig;
                showToast('Loaded default configuration. Create config.json to customize.');
            }
        }

        // Ping function using fetch with no-cors
        async function checkStatus(url) {
            try {
                const urlObj = new URL(url);
                const origin = urlObj.origin;
                const cacheBuster = `?cb=${new Date().getTime()}`;

                // Method 1: Try fetching the favicon (fastest, usually bypasses auth)
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);
                    
                    await fetch(`${origin}/favicon.ico${cacheBuster}`, { 
                        mode: 'no-cors', 
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    return true; // If fetch doesn't throw, it's reachable
                } catch (e) {
                    // Method 1 failed, continue to Method 2
                }

                // Method 2: Try fetching the root URL
                // This will succeed (opaque response) if the server is up, even if it returns 404/500
                // It will throw an error ONLY if the network is unreachable, connection refused, or Mixed Content blocked
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                await fetch(`${url}${url.includes('?') ? '&' : '?'}${cacheBuster.substring(1)}`, { 
                    mode: 'no-cors', 
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                return true;
            } catch (error) {
                // If fetch throws, the server is genuinely unreachable (or blocked by browser Mixed Content rules)
                return false;
            }
        }

        // Render the dashboard
        function renderDashboard() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = '';

            // Backward compatibility: If config has old keys, convert them to sections format
            if (!config.sections) {
                config.sections = [];
                if (config.servers && config.servers.length > 0) config.sections.push({ title: "Server Status", layout: "large", showUrl: true, showStatus: true, items: config.servers.map(s => ({...s, icon: s.icon || '🖥️'})) });
                if (config.tools && config.tools.length > 0) config.sections.push({ title: "Tools", layout: "large", showUrl: false, showStatus: false, items: config.tools });
                if (config.automations && config.automations.length > 0) config.sections.push({ title: "Run Automations", layout: "small", items: config.automations });
                if (config.shortcuts && config.shortcuts.length > 0) config.sections.push({ title: "Applications", layout: "large", showUrl: true, showStatus: true, items: config.shortcuts });
                if (config.scripts && config.scripts.length > 0) config.sections.push({ title: "Scripts", layout: "small", items: config.scripts });
                if (config.workflows && config.workflows.length > 0) config.sections.push({ title: "Workflows", layout: "large", showUrl: false, showStatus: false, items: config.workflows });
                if (config.bookmarks && config.bookmarks.length > 0) config.sections.push({ title: "Bookmarks", layout: "small", items: config.bookmarks });
            }

            config.sections.forEach((section, sIndex) => {
                if (!section.items || section.items.length === 0) return;

                const sectionEl = document.createElement('div');
                sectionEl.className = 'section';
                
                const gridClass = section.layout === 'small' ? 'automations-grid' : 'grid';
                const gridId = `section-grid-${sIndex}`;
                
                sectionEl.innerHTML = `<h2 class="section-title">${section.title}</h2><div class="${gridClass}" id="${gridId}"></div>`;
                container.appendChild(sectionEl);

                const grid = sectionEl.querySelector(`#${gridId}`);

                section.items.forEach((item, iIndex) => {
                    const id = `item-${sIndex}-${iIndex}`;
                    
                    let card;
                    if (item.action) {
                        card = document.createElement('div');
                        card.className = section.layout === 'small' ? 'card automation-card' : 'card';
                        card.onclick = async () => {
                            showToast(`Triggering ${item.name}...`);
                            try {
                                await fetch(item.action, { mode: 'no-cors' });
                                showToast(`Successfully triggered ${item.name}`);
                            } catch (e) {
                                showToast(`Failed to trigger ${item.name}`);
                            }
                        };
                    } else {
                        card = document.createElement('a');
                        card.href = item.url || '#';
                        card.target = "_blank";
                        card.className = section.layout === 'small' ? 'card automation-card' : 'card';
                    }

                    if (section.layout === 'small') {
                        card.innerHTML = `
                            <div class="card-icon">${item.icon || '⚡'}</div>
                            <div class="card-title">${item.name}</div>
                        `;
                    } else {
                        // Large layout
                        let contentHtml = `<div class="card-title ${!section.showUrl ? 'wrap-text' : ''}">${item.name}</div>`;
                        if (section.showUrl && item.url) {
                            contentHtml += `<div class="card-subtitle">${item.url}</div>`;
                        }
                        
                        let statusHtml = '';
                        if (section.showStatus && item.url) {
                            statusHtml = `<div id="${id}-status" class="status-indicator status-checking" title="Checking status..."></div>`;
                        }

                        card.innerHTML = `
                            <div class="card-icon">${item.icon || '🔗'}</div>
                            <div class="card-content">
                                ${contentHtml}
                            </div>
                            ${statusHtml}
                        `;
                    }

                    grid.appendChild(card);

                    // Trigger status check if needed
                    if (section.layout === 'large' && section.showStatus && item.url) {
                        updateStatus(item.url, `${id}-status`);
                    }
                });
            });
        }

        // Update status indicator for a specific element
        async function updateStatus(url, elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            
            el.className = 'status-indicator status-checking';
            el.title = 'Checking status...';
            
            const isOnline = await checkStatus(url);
            
            el.className = `status-indicator ${isOnline ? 'status-online' : 'status-offline'}`;
            el.title = isOnline ? 'Online' : 'Offline';
        }

        // Periodically check all statuses
        function startStatusChecks() {
            setInterval(() => {
                if (!config.sections) return;
                
                config.sections.forEach((section, sIndex) => {
                    if (section.layout === 'large' && section.showStatus && section.items) {
                        section.items.forEach((item, iIndex) => {
                            if (item.url) {
                                updateStatus(item.url, `item-${sIndex}-${iIndex}-status`);
                            }
                        });
                    }
                });
            }, 30000);
        }

        // --- BOOTSTRAP LOGIC ---
        async function bootstrap() {
            await loadConfig();
            renderDashboard();
            startStatusChecks();
        }

        bootstrap();
    </script>
</body>
</html>
